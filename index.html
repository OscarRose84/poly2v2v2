<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Polytopia Token Generator (Player Only)</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:20px;max-width:900px}
    .card{border:1px solid #ddd;border-radius:14px;padding:14px;margin:14px 0}
    input,button,textarea{font-size:16px;padding:10px;margin:6px 0;width:100%;box-sizing:border-box}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .small{color:#555;font-size:14px;line-height:1.35}
  </style>
</head>
<body>
  <h1>Polytopia Token Generator</h1>
  <p class="small">
    Generate your token from your coordinates. Send ONLY the token to the organiser.
  </p>

  <div class="card">
    <h2>Shared settings (must match organiser)</h2>
    <input id="room" value="polytopia-room" placeholder="Room Code (change each match)"/>
    <div class="row">
      <input id="w" type="number" value="100" min="1" step="1" placeholder="Grid width (e.g. 100)"/>
      <input id="h" type="number" value="100" min="1" step="1" placeholder="Grid height (e.g. 100)"/>
    </div>
    <p class="small">
      Everyone must use the same Room Code and W/H as the organiser page.
    </p>
  </div>

  <div class="card">
    <h2>Generate your token</h2>
    <input id="name" placeholder="Your name"/>
    <div class="row">
      <input id="x" type="number" step="1" placeholder="Spawn X"/>
      <input id="y" type="number" step="1" placeholder="Spawn Y"/>
    </div>
    <button id="gen">Generate token</button>
    <textarea id="token" rows="2" readonly placeholder="Your token will appear here..."></textarea>
    <p class="small">Copy the token and send it to the organiser.</p>
  </div>

<script>
/*
  Token design (unchanged):
  - Deterministic anchors from Room Code
  - fp[i] = squared distance to anchor_i
  - Output: Name|fp:...
*/

const K = 8;

// --- deterministic RNG from a string ---
function sha256Hex(str){
  const enc = new TextEncoder().encode(str);
  return crypto.subtle.digest("SHA-256", enc).then(buf => {
    const b = new Uint8Array(buf);
    return [...b].map(x => x.toString(16).padStart(2,"0")).join("");
  });
}
function hexToBigInt(hex){ return BigInt("0x" + hex); }

function xorshift64star(seed){
  let x = seed & ((1n<<64n)-1n);
  return () => {
    x ^= (x >> 12n) & ((1n<<64n)-1n);
    x ^= (x << 25n) & ((1n<<64n)-1n);
    x ^= (x >> 27n) & ((1n<<64n)-1n);
    x = (x * 2685821657736338717n) & ((1n<<64n)-1n);
    const mant = Number(x & ((1n<<53n)-1n));
    return mant / (2**53);
  };
}

async function anchorsFromRoom(room){
  const hex = await sha256Hex("anchors:" + room);
  const seed = hexToBigInt(hex.slice(0,16)); // 64-bit
  const rand = xorshift64star(seed);
  const A = [];
  for(let i=0;i<K;i++) A.push([rand(), rand()]);
  return A;
}

function round6(n){ return Math.round(n*1e6)/1e6; }

async function makeToken(room, name, x, y, w, h){
  const A = await anchorsFromRoom(room);
  const nx = x / w, ny = y / h;
  const fp = A.map(([px,py]) => {
    const dx = nx - px, dy = ny - py;
    return round6(dx*dx + dy*dy);
  });
  return `${name}|fp:${fp.map(v => v.toFixed(6)).join(",")}`;
}

// --- UI wiring ---
const roomEl=document.getElementById("room");
const wEl=document.getElementById("w");
const hEl=document.getElementById("h");
const nameEl=document.getElementById("name");
const xEl=document.getElementById("x");
const yEl=document.getElementById("y");
const tokenEl=document.getElementById("token");

document.getElementById("gen").addEventListener("click", async ()=>{
  const room=roomEl.value.trim();
  const name=nameEl.value.trim();
  const w=Number(wEl.value), h=Number(hEl.value);
  const x=Number(xEl.value), y=Number(yEl.value);

  if(!room||!name||!Number.isFinite(x)||!Number.isFinite(y)||w<=0||h<=0){
    tokenEl.value="Fill in Room Code, Name, X, Y, W, H.";
    return;
  }
  const tok=await makeToken(room,name,x,y,w,h);
  tokenEl.value=tok;
});
</script>
</body>
</html>
